server {
    listen __HTTP_PORT__ default_server;
    listen [::]:__HTTP_PORT__ default_server;

    server_name _;
    root /var/www/sitzungsapp;
    index index.html;

    # Statische Assets aggressiv cachen — App-Files (HTML/JS) frisch halten.
    location ~* \.(png|jpe?g|gif|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(html|js|css|json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sinnvolle Default-Header
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "same-origin";

    client_max_body_size 5m;
}
