<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemeindeverwaltung</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <img src="assets/wappen.png" alt="Wappen" class="brand-wappen" onerror="this.style.display='none'" />
        <div class="sidebar-brand">
          <h1>Gemeindeverwaltung</h1>
          <small>Hörschhausen</small>
        </div>
        <button class="sidebar-collapse" id="sidebarCollapse" title="Seitenleiste ein-/ausklappen" aria-label="Seitenleiste ein-/ausklappen">«</button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"><!-- von app.js aus NAV-Config aufgebaut --></nav>
      <div class="sidebar-foot">
        <button id="syncStatus" class="sync-status sync-status--unconfigured" title="NocoDB nicht konfiguriert" aria-label="Sync-Status">
          <span class="sync-dot"></span>
          <span class="sync-label">Sync</span>
        </button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="content-area">
      <header class="mobile-bar">
        <button class="menu-toggle" id="menuToggle" aria-label="Menü öffnen">☰</button>
        <img src="assets/wappen.png" alt="" class="mobile-wappen" onerror="this.style.display='none'" />
        <span class="mobile-title">Gemeindeverwaltung</span>
      </header>
      <main id="app"></main>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <!-- Verstecktes Wappen-Bild für PDF-Export (wird per Canvas in Data-URL konvertiert, kein fetch). -->
  <img id="wappenImg" src="assets/wappen.png" alt="" style="display:none;" onerror="this.dataset.failed='1'" />

  <!-- Vendor: jsPDF (offline, eine Datei in vendor/) -->
  <script src="vendor/jspdf.inline.js"></script>
  <!-- Vendor: marked (Markdown-Vorschau in der Aufgaben-Detailkarte) -->
  <script src="vendor/marked.min.js"></script>

  <!-- App-Module (klassische Scripts; Reihenfolge wichtig!) -->
  <script src="src/models.js"></script>
  <script src="src/api.js"></script>
  <script src="src/store.js"></script>
  <script src="src/ui/components.js"></script>
  <script src="src/ui/attachments.js"></script>
  <script src="src/ui/antraege.js"></script>
  <script src="src/ui/doc-picker.js"></script>
  <script src="src/ui/doc-upload.js"></script>
  <script src="src/ui/signature.js"></script>
  <script src="src/integrations/nocodb-client.js"></script>
  <script src="src/integrations/auto-sync.js"></script>
  <script src="src/export/csv.js"></script>
  <script src="src/export/nocodb.js"></script>
  <script src="src/export/pdf.js"></script>
  <script src="src/export/vermietung-pdf.js"></script>
  <script src="src/export/auslagen-pdf.js"></script>
  <script src="src/export/ics.js"></script>
  <script src="src/export/vertraege-pdf.js"></script>
  <script src="src/views/uebersicht.js"></script>
  <script src="src/views/dashboard.js"></script>
  <script src="src/views/dokumente.js"></script>
  <script src="src/views/termine.js"></script>
  <script src="src/views/aufgaben.js"></script>
  <script src="src/views/mieter.js"></script>
  <script src="src/views/protokolle.js"></script>
  <script src="src/views/vermietung.js"></script>
  <script src="src/views/vertragspartner.js"></script>
  <script src="src/views/vertraege.js"></script>
  <script src="src/views/auslagen.js"></script>
  <script src="src/views/stammdaten.js"></script>
  <script src="src/views/einstellungen.js"></script>
  <script src="src/views/sitzung-vorbereitung.js"></script>
  <script src="src/views/sitzung-live.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
